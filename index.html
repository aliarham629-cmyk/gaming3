<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>GCAIP.AI | Command Center</title>
    <script>
      // Protection against legacy fetch polyfills that try to overwrite window.fetch
      // In some environments, window.fetch is a read-only getter which throws when assigned to.
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { console.warn('Ignored attempt to overwrite window.fetch'); },
            configurable: true
          });
        } catch (e) {
          console.error('Failed to set fetch protection:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
